name: Deploy to Server

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /root/calai

            echo "[1/4] Pulling latest code..."
            git pull origin main

            echo "[2/4] Installing dependencies..."
            /root/calai/venv/bin/pip install -r requirements.txt

            echo "[3/4] Reloading systemd..."
            cp deploy/calai-bot.service /etc/systemd/system/calai-bot.service
            systemctl daemon-reload

            echo "[4/4] Restarting service..."
            systemctl enable calai-bot.service
            systemctl restart calai-bot.service

            echo "=== Deploy complete ==="
            systemctl status calai-bot.service --no-pager -l
